name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env files from GitHub Secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.BACKEND_ENV_FILE }}" ]; then
            echo "Missing required secret: BACKEND_ENV_FILE"
            exit 1
          fi

          if [ -z "${{ secrets.FRONTEND_ENV_FILE }}" ]; then
            echo "Missing required secret: FRONTEND_ENV_FILE"
            exit 1
          fi

          printf '%s' "${{ secrets.BACKEND_ENV_FILE }}" > backend/.env
          printf '%s' "${{ secrets.FRONTEND_ENV_FILE }}" > frontend/.env

      - name: Preflight deploy script version
        shell: bash
        run: |
          set -euo pipefail
          echo "Workflow SHA: ${GITHUB_SHA}"
          grep -n "SSH auth mode:" deploy_and_restart.sh
          grep -n "Validating SSH connectivity" deploy_and_restart.sh
          grep -n "run-on-remote" deploy_and_restart.sh

      - name: Run full remote recovery deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          CERTBOT_EMAIL: ${{ vars.CERTBOT_EMAIL }}
          DEPLOY_REPO: ${{ vars.DEPLOY_REPO }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ vars.PM2_APP_NAME }}
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
          FRONTEND_ENV_FILE: ${{ secrets.FRONTEND_ENV_FILE }}
          APP_SLUG: tala-mkopaji-com
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          envs: APP_DOMAIN,CERTBOT_EMAIL,DEPLOY_REPO,DEPLOY_BRANCH,DEPLOY_PATH,PM2_APP_NAME,BACKEND_PORT,BACKEND_ENV_FILE,FRONTEND_ENV_FILE,APP_SLUG
          script: |
            set -euo pipefail

            if [ -z "${APP_DOMAIN:-}" ]; then
              echo "Missing required variable: APP_DOMAIN"
              exit 1
            fi

            if [ -z "${CERTBOT_EMAIL:-}" ]; then
              echo "Missing required variable: CERTBOT_EMAIL"
              exit 1
            fi

            REPO_URL="${DEPLOY_REPO:-https://github.com/${{ github.repository }}.git}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            PROJECT_DIR="${DEPLOY_PATH:-/var/www/${APP_SLUG}}"

            WORK_DIR="/tmp/${APP_SLUG}-deploy"
            rm -rf "$WORK_DIR"
            git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$WORK_DIR"

            cd "$WORK_DIR"
            printf '%s' "$BACKEND_ENV_FILE" > backend/.env
            printf '%s' "$FRONTEND_ENV_FILE" > frontend/.env

            sed -i 's/\r$//' ./deploy_and_restart.sh
            chmod +x ./deploy_and_restart.sh

            ARGS=(
              --run-on-remote
              --domain "$APP_DOMAIN"
              --email "$CERTBOT_EMAIL"
              --repo "$REPO_URL"
              --branch "$BRANCH"
              --project-dir "$PROJECT_DIR"
            )

            if [ -n "${PM2_APP_NAME:-}" ]; then
              ARGS+=(--pm2-app-name "$PM2_APP_NAME")
            fi

            if [ -n "${BACKEND_PORT:-}" ]; then
              ARGS+=(--backend-port "$BACKEND_PORT")
            fi

            bash ./deploy_and_restart.sh "${ARGS[@]}"

      - name: Verify domain and API health
        shell: bash
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
        run: |
          set -euo pipefail
          if [ -z "${APP_DOMAIN:-}" ]; then
            echo "Missing required variable: APP_DOMAIN"
            exit 1
          fi

          DOMAIN="$APP_DOMAIN"
          ok=0

          for i in $(seq 1 18); do
            if curl -fsS --max-time 10 "https://$DOMAIN/api/health" >/dev/null; then
              ok=1
              break
            fi

            if curl -fsS --max-time 10 "http://$DOMAIN/api/health" >/dev/null; then
              ok=1
              break
            fi

            if curl -fsS --max-time 10 "https://$DOMAIN" >/dev/null; then
              ok=1
              break
            fi

            if curl -fsS --max-time 10 "http://$DOMAIN" >/dev/null; then
              ok=1
              break
            fi

            echo "Public health check retry ${i}/18"
            sleep 10
          done

          if [ "$ok" -ne 1 ]; then
            echo "Public endpoint did not become healthy in time: $DOMAIN"
            exit 1
          fi

      - name: Auto-diagnose on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        env:
          PM2_APP_NAME: ${{ vars.PM2_APP_NAME }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set +e
            APP_NAME="${PM2_APP_NAME:-backend}"
            APP_ROOT="${DEPLOY_PATH:-}"
            DOMAIN="${APP_DOMAIN:-}"
            PORT="${BACKEND_PORT:-5002}"

            echo "===== AUTO DIAGNOSTICS ====="
            date
            hostname
            whoami

            echo "===== PM2 ====="
            pm2 status || true
            pm2 logs "$APP_NAME" --lines 120 --nostream || true

            echo "===== PORTS / LOCAL HEALTH ====="
            ss -ltnp | grep -E ":80|:443|:${PORT}" || true
            curl -i -m 10 "http://127.0.0.1:${PORT}/api/health" || true

            echo "===== NGINX ====="
            sudo -n nginx -t || true
            sudo -n systemctl status nginx --no-pager -l || true

            echo "===== DOMAIN ====="
            if [ -n "$DOMAIN" ]; then
              curl -I -m 10 "http://$DOMAIN" || true
              curl -k -I -m 10 "https://$DOMAIN" || true
            fi

            if [ -n "$APP_ROOT" ]; then
              echo "===== BACKEND ENV (SAFE) ====="
              grep -E '^(NODE_ENV|PORT|FRONTEND_URL|MPESA_CALLBACK_URL)=' "$APP_ROOT/backend/.env" || true
            fi
